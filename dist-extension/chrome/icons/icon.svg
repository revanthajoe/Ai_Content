    <path d="M12,-40 C12,-20 -12,-20 -12,0 C-12,20 12,20 12,40" stroke="#22d3ee" stroke-width="4" fill="none"/>
    <!-- Cross bars -->
    <line x1="-12" y1="-30" x2="12" y2="-30" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round"/>
    <line x1="-8" y1="-15" x2="8" y2="-15" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round"/>
    <line x1="-12" y1="0" x2="12" y2="0" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round"/>
    <line x1="-8" y1="15" x2="8" y2="15" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round"/>
    <line x1="-12" y1="30" x2="12" y2="30" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
