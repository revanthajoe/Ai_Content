AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Content DNA OS – Evolutionary AI Content Engine

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: python3.11
    Architectures:
      - x86_64
    Environment:
      Variables:
        AWS_REGION_NAME: !Ref AWS::Region
        DYNAMO_TABLE: !Ref ContentDNATable

Resources:
  # ──── API Gateway ──────────────────────────────────────────────────────────
  ContentDNAApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type'"
        AllowOrigin: "'*'"

  # ──── Lambda Function ──────────────────────────────────────────────────────
  ContentDNAFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambda_handler.handler
      CodeUri: ../backend/
      Description: Content DNA OS mutation engine
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ContentDNATable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource:
                - !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/us.amazon.nova-pro-v1:0'
                - !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/us.amazon.nova-lite-v1:0'
                - !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.titan-embed-text-v1'
      Events:
        Root:
          Type: Api
          Properties:
            RestApiId: !Ref ContentDNAApi
            Path: /
            Method: GET
        Health:
          Type: Api
          Properties:
            RestApiId: !Ref ContentDNAApi
            Path: /health
            Method: GET
        Evolve:
          Type: Api
          Properties:
            RestApiId: !Ref ContentDNAApi
            Path: /api/evolve
            Method: POST
        EvolveLab:
          Type: Api
          Properties:
            RestApiId: !Ref ContentDNAApi
            Path: /api/evolve/lab
            Method: POST
        Strategies:
          Type: Api
          Properties:
            RestApiId: !Ref ContentDNAApi
            Path: /api/strategies
            Method: GET
        Platforms:
          Type: Api
          Properties:
            RestApiId: !Ref ContentDNAApi
            Path: /api/platforms
            Method: GET
        DNAExtract:
          Type: Api
          Properties:
            RestApiId: !Ref ContentDNAApi
            Path: /api/dna/extract
            Method: POST
        FitnessScore:
          Type: Api
          Properties:
            RestApiId: !Ref ContentDNAApi
            Path: /api/fitness/score
            Method: POST
        Evolutions:
          Type: Api
          Properties:
            RestApiId: !Ref ContentDNAApi
            Path: /api/evolutions
            Method: GET
        HealthAws:
          Type: Api
          Properties:
            RestApiId: !Ref ContentDNAApi
            Path: /health/aws
            Method: GET
        AudienceSimulate:
          Type: Api
          Properties:
            RestApiId: !Ref ContentDNAApi
            Path: /api/audience/simulate
            Method: POST
        Feedback:
          Type: Api
          Properties:
            RestApiId: !Ref ContentDNAApi
            Path: /api/feedback
            Method: POST
        FeedbackWeights:
          Type: Api
          Properties:
            RestApiId: !Ref ContentDNAApi
            Path: /api/feedback/weights
            Method: GET
        ShareEvolution:
          Type: Api
          Properties:
            RestApiId: !Ref ContentDNAApi
            Path: /api/share/{content_id}
            Method: GET
        Languages:
          Type: Api
          Properties:
            RestApiId: !Ref ContentDNAApi
            Path: /api/languages
            Method: GET

  # ──── DynamoDB Table ───────────────────────────────────────────────────────
  ContentDNATable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: content_id
          AttributeType: S
        - AttributeName: generation
          AttributeType: N
      KeySchema:
        - AttributeName: content_id
          KeyType: HASH
        - AttributeName: generation
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: ContentDNAOS

  # ──── S3 Bucket (archival) ─────────────────────────────────────────────────
  ContentArchiveBucket:
    Type: AWS::S3::Bucket
    Properties:
      LifecycleConfiguration:
        Rules:
          - Id: ArchiveOldContent
            Status: Enabled
            Transitions:
              - TransitionInDays: 90
                StorageClass: GLACIER

  # ──── S3 Bucket (Frontend Hosting) ─────────────────────────────────────────
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${FrontendBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}'

  # ──── CloudFront Distribution ──────────────────────────────────────────────
  FrontendOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub 'content-dna-os-oac-${AWS::AccountId}'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Comment: Content DNA OS Frontend
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref FrontendOAC
            S3OriginConfig:
              OriginAccessIdentity: ''
          - Id: ApiOrigin
            DomainName: !Sub '${ContentDNAApi}.execute-api.${AWS::Region}.amazonaws.com'
            OriginPath: /prod
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          ForwardedValues:
            QueryString: false
          Compress: true
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachedMethods: [GET, HEAD]
            ForwardedValues:
              QueryString: true
              Headers:
                - Content-Type
                - Authorization
            DefaultTTL: 0
            MinTTL: 0
            MaxTTL: 0
          - PathPattern: /health*
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            AllowedMethods: [GET, HEAD, OPTIONS]
            CachedMethods: [GET, HEAD]
            ForwardedValues:
              QueryString: false
            DefaultTTL: 0
            MinTTL: 0
            MaxTTL: 0
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${ContentDNAApi}.execute-api.${AWS::Region}.amazonaws.com/prod/'
  FunctionArn:
    Description: Lambda Function ARN
    Value: !GetAtt ContentDNAFunction.Arn
  TableName:
    Description: DynamoDB Table Name
    Value: !Ref ContentDNATable
  FrontendBucket:
    Description: S3 bucket for frontend assets
    Value: !Ref FrontendBucket
  FrontendUrl:
    Description: CloudFront URL for the frontend
    Value: !Sub 'https://${FrontendDistribution.DomainName}'
  CloudFrontDistributionId:
    Description: CloudFront distribution ID (for cache invalidation)
    Value: !Ref FrontendDistribution
